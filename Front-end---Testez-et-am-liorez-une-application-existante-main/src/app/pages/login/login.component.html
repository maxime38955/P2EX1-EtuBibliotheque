<div class="card-container">
  <h5 class="card-header Login">Login Form</h5>
  <div class="card-body">
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-row">
        
        
      </div>
      <div class="form-group">
        <label>Login</label>
        <input
          type="text"
          formControlName="login"
          class="form-control"
          [ngClass]="{ 'is-invalid': submitted && form['login'].errors }"
        />
        @if (submitted && form['login'].errors) {
          <div class="invalid-feedback">
            @if (form['login'].errors?.['required']) {
              <div>Login is required</div>
            }
          </div>
        }
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="text"
          formControlName="password"
          class="form-control"
          [ngClass]="{ 'is-invalid': submitted && form['password'].errors }"
        />
        @if (submitted && form['password'].errors) {
          <div class="invalid-feedback">
            @if (form['password'].errors?.['required']) {
              <div>password is required</div>
            }
          </div>
        }
      </div>
      <div class="text-center actions">
        <button class="btn btn-login mr-1">Login</button>
        
         <button  class="btn btn-register"  (click)="onRegister()">S'enregistrer </button>   
         <button class="btn btn-home "  (click)="onHome()">
          Home
        </button>
      </div>
    </form>
  </div>
</div>
