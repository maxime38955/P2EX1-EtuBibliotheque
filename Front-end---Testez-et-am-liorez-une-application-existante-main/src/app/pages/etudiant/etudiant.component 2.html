<div class="detail-container">
  <h2>Détails de l'étudiant</h2>

  <form [formGroup]="studentForm">
    <div class="form-group">
      <label>ID</label>
      <input type="text" formControlName="id">
    </div>

    <div class="form-group">
      <label>Prénom</label>
      <input type="text" formControlName="firstName">
    </div>

    <div class="form-group">
      <label>Nom</label>
      <input type="text" formControlName="lastName">
    </div>

    <div class="form-group">
      <label>Login</label>
      <input type="text" formControlName="login">
    </div>

    <div class="form-group">
      <label>Nouveau mot de passe (optionnel)</label>
      <input type="password" formControlName="password">
    </div>

    <div class="actions">
      @if (!isEditable) {
        <button type="button" class="btn-edit" (click)="toggleEdit()">Modifier</button>
        <button type="button" class="btn-delete" (click)="onDelete()">Supprimer</button>
      } 
      @else {
        <button type="button" class="btn-save" (click)="onSave()">Valider</button>
        <button type="button" class="btn-cancel" (click)="toggleEdit()">Annuler</button>
      }
    </div>
  </form>
</div>
