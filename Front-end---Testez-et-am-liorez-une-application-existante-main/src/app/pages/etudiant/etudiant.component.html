 

<div class="card-container">
   <h5 class="card-header Details">Détails de l'étudiant</h5>
 
  <div class="card-body">
  <form [formGroup]="studentForm">
    <div class="form-group">
      <label>ID</label>
      <input type="text" formControlName="id">
    </div>

    <div class="form-group">
      <label>Prénom</label>
      <input type="text" formControlName="firstName">
    </div>

    <div class="form-group">
      <label>Nom</label>
      <input type="text" formControlName="lastName">
    </div>

    <div class="form-group">
      <label>Login</label>
      <input type="text" formControlName="login">
    </div>

    <div class="form-group">
      <label>Nouveau mot de passe (optionnel)</label>
      <input type="password" formControlName="password">
    </div>

    <div class="actions">
      @if (!isEditable) {
        <button type="button" class="btn-modifie" (click)="toggleEdit()">Modifier</button>
        <button type="button" class="btn-suprime" (click)="onDelete()">Supprimer</button>
         <button type="button" class="btn-home" (click)="onReturn()">Retour</button>
      } 
      @else {
        <button type="button" class="btn-valide" (click)="onSave()">Valider</button>
        <button type="button" class="btn-annule" (click)="toggleEdit()">Annuler</button>
      }
    </div>
  </form>
</div>
</div>
